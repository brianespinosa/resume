defaultSemverRangePrefix: ""

logFilters:
  - code: YN0002
    level: error
  - code: YN0060
    level: error
  - code: YN0068
    level: error
  - code: YN0086
    level: error
  # Vercel packages haven't updated peer dep ranges for TypeScript 6; suppress until fixed upstream
  - code: YN0060
    text: "@vercel/backends"
    level: discard
  - code: YN0060
    text: "@vercel/cervel"
    level: discard

nodeLinker: node-modules

packageExtensions:
  "@axe-core/playwright@*":
    peerDependenciesMeta:
      playwright-core:
        optional: true
  "@napi-rs/wasm-runtime@*":
    peerDependenciesMeta:
      "@emnapi/core":
        optional: true
      "@emnapi/runtime":
        optional: true
  # @vercel/backends and @vercel/cervel declare typescript as a required peer dep
  # with range ^4.0.0 || ^5.0.0, which excludes TypeScript 6. Marking as optional
  # suppresses the version mismatch; the logFilters above discard the YN0060 warning.
  "@vercel/backends@*":
    peerDependenciesMeta:
      typescript:
        optional: true
  "@vercel/cervel@*":
    peerDependenciesMeta:
      typescript:
        optional: true
  # @vercel/express and vercel itself have no native typescript peer dep; these
  # extensions satisfy the resolved combined range reported by yarn explain.
  "@vercel/express@*":
    peerDependencies:
      typescript: ">=4.9.5"
  vercel@*:
    peerDependencies:
      typescript: ">=4.9.5"

yarnPath: .yarn/releases/yarn-4.13.0.cjs
