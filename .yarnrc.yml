defaultSemverRangePrefix: ""

logFilters:
  - code: YN0002
    level: error
  - code: YN0060
    level: error
  - code: YN0068
    level: error
  - code: YN0086
    level: error

nodeLinker: node-modules

packageExtensions:
  "@napi-rs/wasm-runtime@*":
    peerDependenciesMeta:
      "@emnapi/core":
        optional: true
      "@emnapi/runtime":
        optional: true

yarnPath: .yarn/releases/yarn-4.13.0.cjs
